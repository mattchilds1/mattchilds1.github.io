    <link rel="stylesheet" href="css/styles.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme"),
          d = window.matchMedia("(prefers-color-scheme:dark)").matches;
        if (t === "dark" || (t === null && d))
          document.documentElement.dataset.theme = "dark";
        else if (t === "light")
          document.documentElement.dataset.theme = "light";
      })();
    </script>
  </head>
  <body>
    <!-- Organic avatar clip-path shape — scales via objectBoundingBox -->
    <svg
      width="0"
      height="0"
      style="position: absolute; overflow: hidden"
      aria-hidden="true"
    >
      <defs>
        <clipPath id="avatar-clip" clipPathUnits="objectBoundingBox">
          <path
            d="
            M 0.13,0.03
            C 0.50,0.00 0.78,0.02 0.89,0.06
            C 0.96,0.09 0.99,0.15 0.97,0.19
            C 1.00,0.50 0.97,0.78 0.93,0.90
            C 0.92,0.95 0.88,0.99 0.83,0.99
            C 0.57,1.01 0.27,0.99 0.12,0.97
            C 0.06,0.96 0.02,0.92 0.02,0.87
            C 0.00,0.57 0.02,0.30 0.06,0.14
            C 0.07,0.08 0.09,0.04 0.13,0.03
            Z
          "
          />
        </clipPath>
      </defs>
    </svg>
    <button
      class="theme-toggle"
      id="theme-toggle"
      aria-label="Toggle colour scheme"
    >
      <span class="theme-toggle-sun" aria-hidden="true">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
          />
        </svg>
      </span>
      <span class="theme-toggle-moon" aria-hidden="true">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </span>
    </button>

          <a href="https://twitter.com/mattec">Twitter</a>

    </main>
    <script>
      document
        .getElementById("theme-toggle")
        .addEventListener("click", function () {
          var isDark = document.documentElement.dataset.theme === "dark";
          document.documentElement.dataset.theme = isDark ? "light" : "dark";
          localStorage.setItem("theme", isDark ? "light" : "dark");
        });
    </script>
