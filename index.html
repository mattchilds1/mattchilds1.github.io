    <meta name="twitter:title" content="Matt Childs" />

    <link rel="stylesheet" href="css/styles.css" />
    <script>
      (function () {
        var t = localStorage.getItem("theme"),
          d = window.matchMedia("(prefers-color-scheme:dark)").matches;
        if (t === "dark" || (t === null && d))
          document.documentElement.dataset.theme = "dark";
        else if (t === "light")
          document.documentElement.dataset.theme = "light";
      })();
    </script>
  </head>
  <body>
    <button
      class="theme-toggle"
      id="theme-toggle"
      aria-label="Toggle colour scheme"
    >
      dark
    </button>
    <main class="page">
      <div class="identity">
        <img
          class="avatar"
          src="https://avatars.githubusercontent.com/u/1014849?v=4&s=96"
          alt="Matt Childs"
          width="48"
          height="48"
        />
        <h1 class="identity-name">Matt Childs 〰️</h1>
        <p class="identity-tagline">
          Product minded software engineering leader
        </p>
        <nav class="social-links" aria-label="Social links">
          <a href="https://www.linkedin.com/in/mattpc/">LinkedIn</a>
          <a href="https://github.com/mattchilds1">GitHub</a>
          <a href="https://twitter.com/mattec">Twitter</a>
        </nav>
      </div>

      <hr class="divider" />

      <section aria-label="Experience">
        <ul class="exp-list">
          <li class="exp-row">
            <span class="exp-role"
              >Chief Technology Officer,
              <em class="exp-company"
                ><a
                  href="https://www.myclientshare.com/"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Clientshare</a
                ></em
              ></span
            >
            <span class="exp-dates">2024–2026</span>
          </li>
          <li class="exp-row">
            <span class="exp-role"
              >VP of Engineering,

                ><a

        <a

      <nav class="page-nav" aria-label="Pages">
        <a href="about.html">About</a>
        <!-- <a href="lists.html">Lists</a> -->
        <!-- TODO: Add lists back in once complete -->
        <a href="writing.html">Writing</a>
      </nav>
    </main>
    <script>
      var btn = document.getElementById("theme-toggle");
      btn.textContent =
        document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      btn.addEventListener("click", function () {
        var isDark = document.documentElement.dataset.theme === "dark";
        document.documentElement.dataset.theme = isDark ? "light" : "dark";
        btn.textContent = isDark ? "dark" : "light";
        localStorage.setItem("theme", isDark ? "light" : "dark");
      });
    </script>
  </body>
